# Nightly live-join refresh [v1.10.2] — re-bake the sources the site consumes, re-export
# the committed per-page JSON (apps/web/src/data/*), and commit any change to `dev`. The
# connected Workers Build then auto-deploys the refreshed site. Keeps real-data freshness
# met [R5a] without human babysitting. `main` is never touched [S5a]: this only commits to dev.
#
# Bakes ONLY the sources the exporters read (members, voteview, acs, fec) — not `bake all` —
# to stay inside api.data.gov quota [S6a]. ponytail: add a source here when an exporter starts
# consuming it (upgrade path = switch to `bake all` if every source becomes consumed).
#
# Race set is NOT regenerated here (generate_races is a curated, manual step) so the roster /
# candidate list stays stable night to night; only the joined figures refresh.
name: refresh

on:
  schedule:
    - cron: "17 9 * * *" # 09:17 UTC nightly (off the hour to dodge GH cron congestion)
  workflow_dispatch: {} # manual trigger

# Never run two refreshes at once (avoids a commit race on dev).
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write # needs to commit the refreshed data back to dev

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: dev
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync --project pipeline

      - name: bake consumed sources + export web JSON
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          set -euo pipefail
          for s in members voteview acs fec tiger; do
            uv run --project pipeline python -m btb_pipeline.cli bake "$s"
          done
          # Freshness/integrity gate [R14a,R5a]: every baked artifact must be a registered source
          # within its freshness floor + in sync with DATA_SOURCES.md. A stale or failed bake fails
          # the job here → GitHub's native failure email → we never export+commit stale data.
          uv run --project pipeline python -m btb_pipeline.integrity
          uv run --project pipeline python -m btb_pipeline.export_web

      - name: commit refreshed data to dev
        run: |
          set -euo pipefail
          git config user.name "btb-data-refresh"
          git config user.email "actions@users.noreply.github.com"
          git add apps/web/src/data
          if git diff --cached --quiet; then
            echo "no data change — nothing to refresh"
            exit 0
          fi
          git commit -m "chore(data): nightly live-join refresh"
          git push origin HEAD:dev
