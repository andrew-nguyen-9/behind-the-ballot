# Keep deps + pinned Action SHAs current [V3a,V4a].
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule: { interval: weekly }
  - package-ecosystem: uv
    directory: "/pipeline"
    schedule: { interval: weekly }
